steps:
  # ==========================================
  # UNIFIED APP — Nocturn AI (Next.js, root)
  # Deployed to: sheerssoft-website (sheerssoft.com)
  # ==========================================

  # 1. Build the Unified Docker image (from root)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheerssoft-website:$_COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheerssoft-website:latest'
      - '.'
    id: 'build-unified-image'

  # 2. Push the Unified Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/sheerssoft-website'
    id: 'push-unified-image'
    waitFor: ['build-unified-image']

  # 3. Cleanup: Remove literal env var to avoid type conflict
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'sheerssoft-website'
      - '--remove-env-vars'
      - 'MAKE_WEBHOOK_URL'
      - '--region'
      - 'asia-southeast1'
      - '--quiet'
    id: 'cleanup-env-vars'
    waitFor: ['push-unified-image']

  # 4. Deploy to Main Website Service (sheerssoft.com)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sheerssoft-website'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sheerssoft-website:$_COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--quiet'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--set-secrets'
      - 'RESEND_API_KEY=RESEND_API_KEY:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest,MAKE_WEBHOOK_URL=MAKE_WEBHOOK_URL:latest,META_CAPI_TOKEN_NOCTURN=META_CAPI_TOKEN_NOCTURN:latest,META_CAPI_TOKEN_SHEERS=META_CAPI_TOKEN_SHEERS:latest'
    id: 'deploy-website'
    waitFor: ['cleanup-env-vars']

images:
  - 'gcr.io/$PROJECT_ID/sheerssoft-website:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sheerssoft-website:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '2400s'
