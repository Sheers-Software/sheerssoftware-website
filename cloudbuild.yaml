steps:
  # ==========================================
  # UNIFIED APP — Nocturn AI (Next.js, root)
  # Deployed to: ai.sheerssoft.com (as product)
  # Redirected from: sheerssoft.com (as site)
  # ==========================================

  # 1. Build the Unified Docker image (from root)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product:$_COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product:latest'
      - '.'
    id: 'build-unified-image'

  # 2. Push the Unified Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product'
    id: 'push-unified-image'
    waitFor: ['build-unified-image']

  # 3. Deploy to Main Product Service (ai.sheerssoft.com)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sheersdigital-product'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product:$_COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--quiet'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--set-secrets'
      - 'RESEND_API_KEY=RESEND_API_KEY:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest'
    id: 'deploy-product'
    waitFor: ['push-unified-image']

  # 4. Deploy to Redirect Service (sheerssoft.com)
  # This service now runs the SAME CODE and uses middleware to 301 redirect to ai.sheerssoft.com
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sheersdigital-site'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product:$_COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--quiet'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--set-secrets'
      - 'RESEND_API_KEY=RESEND_API_KEY:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest'
    id: 'deploy-site-redirect'
    waitFor: ['push-unified-image']

images:
  - 'gcr.io/$PROJECT_ID/sheersdigital-product:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sheersdigital-product:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '2400s'

