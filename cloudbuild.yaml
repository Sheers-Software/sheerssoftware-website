steps:
  # ==========================================
  # PRODUCT APP — Nocturn AI (Next.js, root)
  # Deployed to: ai.sheerssoft.com
  # ==========================================
  # 1. Build the Product Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product:$_COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product:latest'
      - '.'
    id: 'build-product-image'

  # 2. Push the Product Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product'
    id: 'push-product-image'
    waitFor: ['build-product-image']

  # 3. Deploy Product to Cloud Run (secrets injected from Secret Manager)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sheersdigital-product'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sheersdigital-product:$_COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--verbosity=debug'
      - '--quiet'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--set-secrets'
      - 'RESEND_API_KEY=RESEND_API_KEY:latest,META_CAPI_TOKEN_NOCTURN=META_CAPI_TOKEN_NOCTURN:latest,META_CAPI_TOKEN_SHEERS=META_CAPI_TOKEN_SHEERS:latest,WHATSAPP_WEBHOOK_URL=WHATSAPP_WEBHOOK_URL:latest'
    id: 'deploy-product-cloud-run'
    waitFor: ['push-product-image']

  # ==========================================
  # BUSINESS WEBSITE — SheersSoft (Next.js, /business-website)
  # Deployed to: sheerssoft.com
  # ==========================================
  # 4. Build the Website Docker image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'business-website'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheersdigital-site:$_COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sheersdigital-site:latest'
      - '.'
    id: 'build-website-image'

  # 5. Push the Website Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/sheersdigital-site'
    id: 'push-website-image'
    waitFor: ['build-website-image']

  # 6. Deploy Website to Cloud Run (no secrets — static Next.js, all tracking is client-side)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sheersdigital-site'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sheersdigital-site:$_COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--verbosity=debug'
      - '--quiet'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
    id: 'deploy-website-cloud-run'
    waitFor: ['push-website-image']

images:
  - 'gcr.io/$PROJECT_ID/sheersdigital-product:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sheersdigital-product:latest'
  - 'gcr.io/$PROJECT_ID/sheersdigital-site:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sheersdigital-site:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  # Use the service account that we know has the correct permissions
  serviceAccount: 'projects/sheers-software/serviceAccounts/github-actions-deploy@sheers-software.iam.gserviceaccount.com'

timeout: '2400s'
