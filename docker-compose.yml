services:
  # Unified Nocturn AI site (handles both sheerssoft.com and ai.sheerssoft.com via middleware)
  nocturn-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nocturn-ai
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - RESEND_API_KEY=test_key
      - WHATSAPP_VERIFY_TOKEN=test_token
