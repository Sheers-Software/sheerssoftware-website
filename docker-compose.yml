services:
  # Nocturn AI product site (ai.sheerssoft.com)
  nocturn-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nocturn-ai
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

  # Corporate business website (sheerssoft.com)
  business-website:
    build:
      context: ./business-website
      dockerfile: Dockerfile
    container_name: business-website
    ports:
      - "8081:8080"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
