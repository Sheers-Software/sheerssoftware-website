services:
  # sheerssoft-website (Unified application)
  sheerssoft-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sheerssoft-website
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - RESEND_API_KEY=test_key
      - WHATSAPP_VERIFY_TOKEN=test_token
