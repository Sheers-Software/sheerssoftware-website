name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for GCP credentials
      id: check-credentials
      run: |
        if [ -n "${{ secrets.GCP_SA_KEY }}" ]; then
          echo "GCP credentials found"
          echo "has_credentials=true" >> $GITHUB_OUTPUT
        else
          echo "GCP credentials not found - skipping deployment"
          echo "has_credentials=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Google Auth
      if: steps.check-credentials.outputs.has_credentials == 'true'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      if: steps.check-credentials.outputs.has_credentials == 'true'
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: sheers-software

    - name: Execute Cloud Build
      if: steps.check-credentials.outputs.has_credentials == 'true'
      run: |
        gcloud builds submit --config cloudbuild.yaml --substitutions=_COMMIT_SHA=${{ github.sha }} --project sheers-software .

    - name: Setup Instructions
      if: steps.check-credentials.outputs.has_credentials == 'false'
      run: |
        echo "## ⚠️ Setup Required"
        echo ""
        echo "To enable automatic deployment, please add the GCP_SA_KEY secret"
        echo "in your GitHub repository settings under Secrets and Variables -> Actions."
        exit 1
